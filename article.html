<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - GameNews 游戏资讯网</title>
    <!-- 网页图标 Favicon - 使用 Emoji 图标 -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='70' font-size='70' text-anchor='middle' fill='%2300ff88'>🎮</text></svg>">
<link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%2300ff88'%3E🎮%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%2300ff88'%3E🎮%3C/text%3E%3C/svg%3E">
    
    <!-- 主题预加载脚本 - 必须在 CSS 之前 -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🎮 GameNews</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="games.html">游戏库</a></li>
                <li><a href="about.html">关于</a></li>
            </ul>
            <div class="right-nav">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="搜索游戏、资讯..." class="search-input">
                    <button id="search-btn" class="search-btn">🔍</button>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">🌙</button>
        </div>
    </nav>

    <!-- 文章内容容器 -->
    <div class="container" id="article-container">
        <!-- 文章内容会由 main.js 动态加载到这里 -->
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2025 GameNews 游戏资讯网 | 仅用于学习练习</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
